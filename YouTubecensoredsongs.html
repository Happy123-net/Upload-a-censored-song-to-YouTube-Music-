<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Censored Music Uploader</title>
  <style>
    body { font-family: sans-serif; background: #1e1e1e; color: white; padding: 2em; }
    input, button, textarea { display: block; margin: 10px 0; padding: 10px; width: 100%; }
    #uploadForm, #logoutBtn { display: none; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>🎵 Censored Music to YouTube Uploader</h2>

  <div id="login">
    <button onclick="startAuth()">Sign in with Google</button>
    <p>Don’t have a Google account? <a href="https://accounts.google.com/signup" target="_blank" style="color:#0af;">Create one</a></p>
  </div>

  <div id="uploadForm">
    <h3>Upload Clean Song</h3>
    <input type="text" id="title" placeholder="Song Title" required />
    <textarea id="description" placeholder="Description (no profanity)"></textarea>
    <input type="file" id="audio" accept="audio/*" required />
    <input type="file" id="cover" accept="image/*" />
    <p id="draftFileStatus" style="color: #0af;"></p>
    <button onclick="saveDraft()">Save Draft</button>
    <button onclick="uploadVideo()">Upload to YouTube</button>
    <button id="logoutBtn" onclick="logout()">Logout</button>
    <p class="error" id="error"></p>
    <p id="status"></p>

    <h4>📁 Saved Drafts</h4>
    <ul id="draftsList"></ul>
  </div>

  <script>
    const clientId = "1062585238262-am055rt24e7qbqjbtf5h3vi9injdqbks.apps.googleusercontent.com"; // Replace with real ID
    const redirectUri = location.origin + location.pathname;
    let accessToken = null;
    let codeVerifier = null;

    // IndexedDB Setup
    let db;
    const dbName = "CensoredMusicDB";

    function initDB() {
      const req = indexedDB.open(dbName, 1);
      req.onupgradeneeded = function (e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("uploads")) {
          db.createObjectStore("uploads", { keyPath: "id", autoIncrement: true });
        }
      };
      req.onsuccess = function (e) {
        db = e.target.result;
        loadDrafts();
      };
      req.onerror = () => console.error("Failed to open DB");
    }

    let restoredDraftFiles = null;
    let currentDraftId = null;

    function saveToDB(draftData) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction("uploads", "readwrite");
        const store = tx.objectStore("uploads");
        // Use put to allow overwriting/updating drafts. If id is not present, it's an add.
        const req = store.put(draftData);
        req.onsuccess = () => {
          console.log("Draft saved with ID:", req.result);
          loadDrafts(); // Refresh list
          resolve(req.result); // Resolve with the key of the saved object
        };
        req.onerror = () => {
          console.error("Failed to save draft:", req.error);
          document.getElementById("error").textContent = "Failed to save draft.";
          reject(req.error);
        };
      });
    }

    async function saveDraft() {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      let audio = document.getElementById("audio").files[0];
      let cover = document.getElementById("cover").files[0];
      const statusEl = document.getElementById("status");

      statusEl.textContent = "";

      if (!title) {
        document.getElementById("error").textContent = "Title is required to save a draft.";
        return;
      }

      // Use restored files if no new files are selected
      if (!audio && restoredDraftFiles && restoredDraftFiles.audioFile) {
          audio = restoredDraftFiles.audioFile;
      }
      if (!cover && restoredDraftFiles && restoredDraftFiles.coverFile) {
          cover = restoredDraftFiles.coverFile;
      }

      const draft = { title, description, audioFile: audio, coverFile: cover };
      if (currentDraftId) {
        draft.id = currentDraftId;
      }

      const savedId = await saveToDB(draft);
      currentDraftId = savedId; // Keep track of the current draft ID
      statusEl.textContent = "Draft saved!";
    }

    function loadDrafts() {
      const tx = db.transaction("uploads", "readonly");
      const store = tx.objectStore("uploads");
      const req = store.getAll();
      req.onsuccess = () => {
        const list = document.getElementById("draftsList");
        list.innerHTML = "";
        req.result.forEach(item => {
          const li = document.createElement("li");

          const container = document.createElement('div');
          container.style.display = 'flex';
          container.style.alignItems = 'center';
          container.style.marginBottom = '5px';

          const titleSpan = document.createElement('span');
          titleSpan.textContent = item.title;
          titleSpan.style.flexGrow = '1';

          const restoreBtn = document.createElement('button');
          restoreBtn.textContent = `Restore`;
          restoreBtn.style.cursor = "pointer";
          restoreBtn.style.width = 'auto';
          restoreBtn.style.margin = '0 5px';
          restoreBtn.onclick = () => restoreDraft(item);

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Delete';
          deleteBtn.style.cursor = "pointer";
          deleteBtn.style.width = 'auto';
          deleteBtn.style.margin = '0';
          deleteBtn.onclick = (e) => {
              e.stopPropagation();
              deleteDraft(item.id);
          };

          container.appendChild(titleSpan);
          container.appendChild(restoreBtn);
          container.appendChild(deleteBtn);
          li.appendChild(container);
          list.appendChild(li);
        });
      };
    }

    function restoreDraft(draft) {
      document.getElementById("title").value = draft.title;
      document.getElementById("description").value = draft.description;

      restoredDraftFiles = {
          audioFile: draft.audioFile,
          coverFile: draft.coverFile
      };
      currentDraftId = draft.id;

      const statusEl = document.getElementById("draftFileStatus");
      let fileStatusText = "Files loaded from draft: ";
      if (draft.audioFile) fileStatusText += ` ${draft.audioFile.name}`;
      if (draft.coverFile) fileStatusText += `, ${draft.coverFile.name}`;
      statusEl.textContent = fileStatusText;

      document.getElementById("audio").value = "";
      document.getElementById("cover").value = "";
      document.getElementById("status").textContent = "Draft restored.";
    }

    function deleteDraft(id) {
      const tx = db.transaction("uploads", "readwrite");
      const store = tx.objectStore("uploads");
      store.delete(id);
      tx.oncomplete = () => {
          console.log(`Draft ${id} deleted.`);
          if (currentDraftId === id) {
              currentDraftId = null;
              restoredDraftFiles = null;
              document.getElementById('draftFileStatus').textContent = '';
              document.getElementById("title").value = '';
              document.getElementById("description").value = '';
          }
          loadDrafts(); // Refresh list
      };
    }

    function generateCodeVerifier() {
      const array = new Uint32Array(56);
      crypto.getRandomValues(array);
      return btoa(Array.from(array).map(x => x % 36).map(n => n.toString(36)).join('')).replace(/=/g, '');
    }

    async function generateCodeChallenge(verifier) {
      const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
      return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function startAuth() {
      codeVerifier = generateCodeVerifier();
      sessionStorage.setItem('codeVerifier', codeVerifier); // Store verifier
      const codeChallenge = await generateCodeChallenge(codeVerifier);
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=https://www.googleapis.com/auth/youtube.upload https://www.googleapis.com/auth/youtube&code_challenge=${codeChallenge}&code_challenge_method=S256&access_type=online`;
      window.location.href = authUrl;
    }

    async function handleRedirect() {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      if (!code) return;

      const storedVerifier = sessionStorage.getItem('codeVerifier');
      if (!storedVerifier) {
        console.error("Code verifier not found in session storage.");
        document.getElementById("error").textContent = "Authentication error: Could not verify session. Please try signing in again.";
        return;
      }

      const body = new URLSearchParams({
        client_id: clientId,
        grant_type: "authorization_code",
        code,
        redirect_uri: redirectUri,
        code_verifier: storedVerifier
      });

      const res = await fetch("https://oauth2.googleapis.com/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body
      });

      const data = await res.json();
      if (data.access_token) {
        accessToken = data.access_token;
        sessionStorage.setItem('accessToken', accessToken);
        document.getElementById("login").style.display = "none";
        document.getElementById("uploadForm").style.display = "block";
      } else {
        console.error("Authentication failed:", data);
        document.getElementById("error").textContent = "Authentication failed. Please try again.";
      }
      history.replaceState(null, "", redirectUri);
    }

    function logout() {
      accessToken = null;
      sessionStorage.removeItem('codeVerifier');
      sessionStorage.removeItem('accessToken');

      document.getElementById("title").value = '';
      document.getElementById("description").value = '';
      document.getElementById("audio").value = '';
      document.getElementById("cover").value = '';
      restoredDraftFiles = null;
      currentDraftId = null;
      document.getElementById('draftFileStatus').textContent = '';
      document.getElementById('error').textContent = '';
      document.getElementById('status').textContent = '';

      document.getElementById("login").style.display = "block";
      document.getElementById("uploadForm").style.display = "none";

      history.replaceState(null, "", redirectUri);
    }

    function containsProfanity(text) {
      const badWords = ["fuck", "shit", "bitch", "asshole", "nigga", "nigger"];
      const regex = new RegExp(`\\b(${badWords.join('|')})\\b`, 'i');
      return regex.test(text);
    }

    async function uploadVideo() {
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      let audio = document.getElementById("audio").files[0];
      let cover = document.getElementById("cover").files[0];
      const errorEl = document.getElementById("error");
      const statusEl = document.getElementById("status");
      const uploadBtn = document.querySelector('button[onclick="uploadVideo()"]');
      const saveBtn = document.querySelector('button[onclick="saveDraft()"]');

      errorEl.textContent = '';
      statusEl.textContent = '';

      uploadBtn.disabled = true;
      saveBtn.disabled = true;

      try {
        // Use restored files if no new files are selected
        if (!audio && restoredDraftFiles && restoredDraftFiles.audioFile) {
            audio = restoredDraftFiles.audioFile;
        }
        if (!cover && restoredDraftFiles && restoredDraftFiles.coverFile) {
            cover = restoredDraftFiles.coverFile;
        }

        if (!title || !audio) {
          errorEl.textContent = "Title and audio are required.";
          return;
        }

        if (containsProfanity(title + " " + description)) {
          errorEl.textContent = "Profanity detected.";
          return;
        }

        statusEl.textContent = "Preparing video for upload...";

        const videoBlob = await simulateVideoCreation(audio, cover, title);

        if (!videoBlob) {
            errorEl.textContent = "Failed to create video from audio and cover.";
            statusEl.textContent = "";
            return;
        }

        const metadata = {
          snippet: { title, description, tags: ["clean", "music"], categoryId: "10" },
          status: { privacyStatus: "public" }
        };

        const form = new FormData();
        form.append("snippet", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
        form.append("video", videoBlob, "video.webm");

        statusEl.textContent = "Uploading to YouTube...";

        const res = await fetch("https://www.googleapis.com/upload/youtube/v3/videos?part=snippet,status", {
          method: "POST",
          headers: { Authorization: `Bearer ${accessToken}` },
          body: form
        });

        const result = await res.json();
        if (result.id) {
          statusEl.textContent = "✅ Uploaded! Adding to playlist...";
          await addToCleanPlaylist(result.id);
          statusEl.textContent += "\n✅ Added to 'Clean Music (No Cursing)'";

          if (currentDraftId) {
              deleteDraft(currentDraftId);
          }
          document.getElementById("title").value = '';
          document.getElementById("description").value = '';
          document.getElementById("audio").value = '';
          document.getElementById("cover").value = '';
          restoredDraftFiles = null;
          currentDraftId = null;
          document.getElementById('draftFileStatus').textContent = '';

        } else {
          console.error("Upload failed:", result);
          errorEl.textContent = `Upload failed: ${result.error?.message || 'Unknown error'}`;
        }
      } catch (e) {
          console.error("Exception during upload:", e);
          errorEl.textContent = "An error occurred during upload. Check console for details.";
      } finally {
          uploadBtn.disabled = false;
          saveBtn.disabled = false;
      }
    }

    async function addToCleanPlaylist(videoId) {
      let playlistId = await findPlaylistId("Clean Music (No Cursing)");
      if (!playlistId) {
        const res = await fetch("https://www.googleapis.com/youtube/v3/playlists?part=snippet", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            snippet: {
              title: "Clean Music (No Cursing)",
              description: "Playlist of clean songs with no cursing.",
            },
            status: { privacyStatus: "public" }
          })
        });
        const data = await res.json();
        playlistId = data.id;
      }

      await fetch("https://www.googleapis.com/youtube/v3/playlistItems?part=snippet", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${accessToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          snippet: {
            playlistId,
            resourceId: { kind: "youtube#video", videoId }
          }
        })
      });
    }

    async function findPlaylistId(title) {
      const res = await fetch("https://www.googleapis.com/youtube/v3/playlists?part=snippet&mine=true&maxResults=50", {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const data = await res.json();
      const match = data.items.find(p => p.snippet.title === title);
      return match ? match.id : null;
    }

    async function simulateVideoCreation(audioFile, coverFile, title) {
      try {
        // 1. Setup Canvas for video
        const canvas = document.createElement("canvas");
        canvas.width = 1280;
        canvas.height = 720;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (coverFile) {
            const img = new Image();
            const imgUrl = URL.createObjectURL(coverFile);
            img.src = imgUrl;
            await img.decode();
            // Draw centered cover art
            const aspectRatio = img.width / img.height;
            let drawWidth = canvas.width;
            let drawHeight = canvas.width / aspectRatio;
            if (drawHeight > canvas.height) {
                drawHeight = canvas.height;
                drawWidth = canvas.height * aspectRatio;
            }
            const x = (canvas.width - drawWidth) / 2;
            const y = (canvas.height - drawHeight) / 2;
            ctx.drawImage(img, x, y, drawWidth, drawHeight);
            URL.revokeObjectURL(imgUrl); // Clean up
        }

        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, 120);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 60px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(title, canvas.width / 2, 80);

        const videoStream = canvas.captureStream(25); // 25 fps
        const [videoTrack] = videoStream.getVideoTracks();

        // 2. Setup Web Audio API for audio
        const audioCtx = new AudioContext();
        const audioBuffer = await audioCtx.decodeAudioData(await audioFile.arrayBuffer());
        const audioSource = audioCtx.createBufferSource();
        audioSource.buffer = audioBuffer;

        const audioDestination = audioCtx.createMediaStreamDestination();
        audioSource.connect(audioDestination);

        const [audioTrack] = audioDestination.stream.getAudioTracks();

        // 3. Combine streams
        const combinedStream = new MediaStream([videoTrack, audioTrack]);

        // 4. Record the combined stream
        const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);

        const recordingPromise = new Promise(resolve => {
            recorder.onstop = () => {
                resolve(new Blob(chunks, { type: "video/webm" }));
            };
        });

        audioSource.start();
        recorder.start();

        // Stop recording when the audio finishes
        audioSource.onended = () => {
            recorder.stop();
            audioCtx.close();
        };

        return recordingPromise;

      } catch (error) {
        console.error("Video creation failed:", error);
        document.getElementById("error").textContent = `Error creating video: ${error.message}`;
        return null;
      }
    }

    function checkLoginState() {
        accessToken = sessionStorage.getItem('accessToken');
        if (accessToken) {
            document.getElementById("login").style.display = "none";
            document.getElementById("uploadForm").style.display = "block";
        }
    }

    initDB();
    if (location.search.includes("code=")) {
        handleRedirect();
    } else {
        checkLoginState();
    }
  </script>
</body>
</html>
